<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Akram Abril - 3D & AI Content Portfolio</title>
<meta name="description" content="Portfolio of Akram Abril - 3D product visuals, AI ads, virtual influencer content, interior rendering and motion graphics." />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230b0d12'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-family='Arial,sans-serif' font-size='24' font-weight='800' fill='%23c9952d'%3EAK%3C/text%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='42' fill='%230b0d12'/%3E%3Ctext x='90' y='112' text-anchor='middle' font-family='Arial,sans-serif' font-size='68' font-weight='800' fill='%23c9952d'%3EAK%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://unpkg.com">
<style>
:root{
  --bg:#f7f3ea;
  --surface:#ffffff;
  --surface-2:#f0ebe0;
  --surface-3:#e7f6f2;
  --text:#141820;
  --muted:#5f6874;
  --line:rgba(20,24,32,.13);
  --gold:#c9952d;
  --cyan:#049b93;
  --coral:#f07b62;
  --ink:#0b0d12;
  --cream:#fff8ea;
  --sky:#e8f5ff;
  --mint:#e4f7ef;
  --rose:#fff0ea;
  --shadow:0 24px 70px rgba(32,38,48,.16);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{
  margin:0;
  overflow-x:hidden;
  color:var(--text);
  background:
    linear-gradient(145deg,rgba(240,123,98,.16),transparent 26%),
    linear-gradient(225deg,rgba(4,155,147,.14),transparent 24%),
    linear-gradient(180deg,#fffaf0 0%,#f3fbff 46%,#fff4ed 100%);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif;
  line-height:1.5;
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(20,24,32,.055) 1px,transparent 1px),
    linear-gradient(90deg,rgba(20,24,32,.055) 1px,transparent 1px);
  background-size:72px 72px;
  mask-image:linear-gradient(180deg,rgba(0,0,0,.8),transparent 72%);
}
a{color:inherit;text-decoration:none}
button,input,textarea{font:inherit}
button{cursor:pointer}
img,video{display:block;max-width:100%}
input,textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 13px;
  color:var(--text);
  background:rgba(255,255,255,.86);
  outline:none;
}
textarea{min-height:112px;resize:vertical}
input:focus,textarea:focus{border-color:rgba(201,149,45,.72);box-shadow:0 0 0 3px rgba(201,149,45,.16)}
.wrap{width:min(1180px,92vw);margin:0 auto}
.nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:30;
  border-bottom:1px solid rgba(255,255,255,.12);
  background:#080808;
  backdrop-filter:blur(18px);
  transition:box-shadow .25s ease;
}
.nav.isScrolled{
  box-shadow:0 14px 34px rgba(0,0,0,.18);
}
.nav.isScrolled ~ .hero .heroBg{
  top:68px;
  height:calc(100vh - 68px);
}
.jobStrip{
  overflow:hidden;
  background:#080808;
  color:var(--gold);
  text-align:center;
  font-size:12px;
  font-weight:850;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:9px 12px;
  max-height:40px;
  opacity:1;
  transform:translateY(0);
  transition:max-height .34s ease,padding .34s ease,opacity .22s ease,transform .34s ease;
}
.nav.isScrolled .jobStrip{
  max-height:0;
  padding-top:0;
  padding-bottom:0;
  opacity:0;
  transform:translateY(-100%);
}
.navin{position:relative;display:flex;align-items:center;justify-content:space-between;gap:22px;padding:15px 0}
.brand{display:flex;align-items:center;gap:10px;min-width:0;font-weight:850;letter-spacing:.01em}
.brand{color:#fff}
.mark{width:38px;height:38px;flex:0 0 38px;border-radius:50%;display:block;overflow:hidden;border:2px solid var(--gold);background:#111;box-shadow:0 0 0 1px rgba(255,255,255,.12)}
.mark img{width:100%;height:100%;object-fit:cover}
.navlinks{display:flex;align-items:center;gap:8px}
.navActions{display:flex;align-items:center;gap:10px}
.headerSocial{
  display:flex;
  align-items:center;
  gap:8px;
}
.headerSocial a{
  width:36px;
  height:36px;
  display:grid;
  place-items:center;
  border:1px solid rgba(255,255,255,.16);
  border-radius:50%;
  color:#fff;
  background:rgba(255,255,255,.06);
  transition:background .18s ease,border-color .18s ease,color .18s ease,transform .18s ease;
}
.headerSocial a:hover{
  border-color:var(--gold);
  color:#171109;
  background:var(--gold);
  transform:translateY(-2px);
}
.headerSocial svg,
.headerSocial img{
  width:18px;
  height:18px;
  display:block;
}
.headerSocial img{
  filter:invert(1);
}
.headerSocial a:hover img{
  filter:brightness(0) saturate(100%);
}
.navlinks a,.iconBtn{
  border:1px solid transparent;
  color:rgba(255,255,255,.68);
  border-radius:999px;
  padding:9px 12px;
  font-size:14px;
}
.navlinks a:hover{color:#fff;border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.08)}
.iconBtn{display:none;min-width:42px;min-height:42px;padding:0;border-radius:50%;color:var(--gold);border-color:rgba(201,149,45,.48);background:rgba(201,149,45,.1)}
.iconBtn:hover{color:#171109;border-color:var(--gold);background:var(--gold)}
.menuIcon{
  position:relative;
  width:18px;
  height:12px;
  display:block;
}
.menuIcon:before,
.menuIcon:after,
.menuIcon span{
  content:"";
  position:absolute;
  left:0;
  width:100%;
  height:2px;
  border-radius:999px;
  background:currentColor;
}
.menuIcon:before{top:0}
.menuIcon span{top:5px}
.menuIcon:after{bottom:0}
.mobileMenu{display:none}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:9px;
  min-height:44px;
  border:1px solid var(--line);
  border-radius:999px;
  padding:11px 16px;
  color:var(--text);
  background:rgba(255,255,255,.55);
  transition:transform .2s ease,background .2s ease,border-color .2s ease;
}
.btn:hover{transform:translateY(-2px);background:rgba(255,255,255,.9)}
.btn.primary{background:var(--gold);color:#171109;border-color:var(--gold);font-weight:850}
.btn.dark{background:var(--text);color:#fff}
.navCta{min-height:38px;padding:8px 14px;font-size:14px}
.hero{
  position:relative;
  padding:0;
  min-height:0;
  display:block;
  overflow:visible;
  background:#15120d;
  --hero-progress:0;
  --hero-overlay:0;
  --copy-opacity:0;
  --copy-y:54px;
}
.heroBg{
  position:fixed;
  top:88px;
  left:0;
  right:0;
  z-index:0;
  height:calc(100vh - 88px);
  background:#15120d;
  overflow:hidden;
  pointer-events:none;
  visibility:visible;
}
.heroBg.isDormant{
  visibility:hidden;
}
.heroBg video{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center top;
  opacity:var(--hero-video-opacity);
  transform:none;
  filter:none;
  image-rendering:auto;
}
.hero:after{
  content:"";
  position:absolute;
  inset:0;
  z-index:-1;
  pointer-events:none;
  background:transparent;
}
.heroLayout{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(320px,460px);
  gap:34px;
  align-items:center;
  min-height:0;
  margin-top:0;
  padding-top:74vh;
  padding-bottom:16vh;
}
.heroLayout:before{
  content:"";
  position:absolute;
  inset:58vh -100vmax 0;
  z-index:-1;
  background:
    linear-gradient(180deg,transparent,rgba(0,0,0,.16) 24%,rgba(255,250,240,.3)),
    linear-gradient(90deg,rgba(0,0,0,.2),rgba(0,0,0,.05) 56%,rgba(255,250,240,.12));
  opacity:var(--hero-overlay);
}
.kicker{color:var(--cyan);text-transform:uppercase;letter-spacing:.16em;font-size:12px;font-weight:850}
h1{font-size:clamp(42px,6.8vw,88px);line-height:.94;margin:14px 0 20px;max-width:900px;letter-spacing:0}
.highlight{
  color:inherit;
  position:relative;
  display:inline-block;
}
.highlight:after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:.02em;
  height:.2em;
  z-index:-1;
  background:rgba(201,149,45,.62);
  box-shadow:0 0 18px rgba(201,149,45,.28);
}
.lead{font-size:clamp(18px,2vw,23px);color:var(--muted);max-width:760px;margin:0 0 26px}
.actions{display:flex;flex-wrap:wrap;gap:10px}
.heroGlass{
  width:min(900px,100%);
  padding:0;
  border:0;
  border-radius:0;
  background:transparent;
  backdrop-filter:none;
  opacity:var(--copy-opacity);
  transform:translateY(var(--copy-y));
  visibility:hidden;
  pointer-events:none;
  transition:none;
}
.heroFrame{
  width:100%;
  aspect-ratio:var(--frame-ratio,16/9);
  border:1px solid rgba(255,255,255,.28);
  border-radius:10px;
  overflow:hidden;
  background:#050505;
  box-shadow:0 24px 70px rgba(0,0,0,.36);
  opacity:var(--copy-opacity);
  transform:translateY(var(--copy-y));
  visibility:hidden;
  pointer-events:none;
  transition:none;
}
.heroFrame.isVisible{
  visibility:visible;
}
.heroFrame video{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  background:#050505;
}
.heroGlass.isVisible{
  opacity:var(--copy-opacity);
  transform:translateY(var(--copy-y));
  visibility:visible;
  pointer-events:auto;
}
.heroGlass h1,
.heroGlass .lead{
  color:#fff;
  text-shadow:0 3px 24px rgba(0,0,0,.52),0 10px 42px rgba(0,0,0,.28);
}
.heroGlass .kicker{
  color:#fff4d8;
  text-shadow:0 3px 18px rgba(0,0,0,.46);
}
.heroGlass .btn{
  background:rgba(255,255,255,.72);
  box-shadow:0 12px 30px rgba(20,24,32,.12);
}
.heroGlass .btn.dark{
  background:rgba(20,24,32,.9);
  color:#fff;
}
.heroGlass h1,
.heroGlass .lead,
.heroGlass .roleLine,
.heroGlass .actions{
  animation:none;
}
.heroGlass:not(.isVisible) h1,
.heroGlass:not(.isVisible) .lead{animation:none}
.heroGlass.isVisible h1,
.heroGlass.isVisible .lead,
.heroGlass.isVisible .roleLine{animation:none}
@keyframes heroItem{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}
.roleLine{
  margin:0 0 14px;
  color:var(--gold);
  text-transform:uppercase;
  letter-spacing:.16em;
  font-size:12px;
  font-weight:850;
  text-shadow:0 3px 18px rgba(0,0,0,.46);
}
section{position:relative;padding:62px 0}
section{clip-path:inset(0 -100vmax)}
section:nth-of-type(1){background:linear-gradient(145deg,#fffaf0 0%,#eef9f6 48%,#fff4ee 100%);box-shadow:0 0 0 100vmax #eef9f6}
section:nth-of-type(2){background:var(--mint);box-shadow:0 0 0 100vmax var(--mint)}
section:nth-of-type(3){background:linear-gradient(135deg,#fff,var(--rose));box-shadow:0 0 0 100vmax var(--rose)}
section:nth-of-type(4){background:var(--sky);box-shadow:0 0 0 100vmax var(--sky)}
section:nth-of-type(5){background:linear-gradient(135deg,var(--cream),#fff);box-shadow:0 0 0 100vmax var(--cream)}
#showreel{background:#fbf2df;box-shadow:0 0 0 100vmax #fbf2df}
#showreel{padding-top:96px}
#services{
  isolation:isolate;
  overflow:visible;
  background:transparent;
  box-shadow:none;
  color:#fffaf0;
}
#services:before{
  content:"";
  position:absolute;
  top:0;
  bottom:0;
  left:50%;
  width:100vw;
  z-index:0;
  transform:translateX(-50%);
  pointer-events:none;
  background:
    linear-gradient(60deg,transparent 49%,rgba(201,149,45,.18) 50%,transparent 51%),
    linear-gradient(-60deg,transparent 49%,rgba(201,149,45,.18) 50%,transparent 51%),
    linear-gradient(0deg,transparent 49%,rgba(201,149,45,.14) 50%,transparent 51%),
    radial-gradient(circle at 18% 18%,rgba(201,149,45,.18),transparent 34%),
    #101014;
  background-size:42px 72px,42px 72px,42px 72px,auto,auto;
}
#services > *{
  position:relative;
  z-index:1;
}
#services .sub{color:rgba(255,250,240,.68)}
#contact{
  isolation:isolate;
  background:transparent;
  box-shadow:none;
}
#contact:before{
  content:"";
  position:absolute;
  top:0;
  bottom:0;
  left:50%;
  width:100vw;
  z-index:0;
  transform:translateX(-50%);
  pointer-events:none;
  background:
    linear-gradient(60deg,transparent 49%,rgba(201,149,45,.16) 50%,transparent 51%),
    linear-gradient(-60deg,transparent 49%,rgba(201,149,45,.16) 50%,transparent 51%),
    linear-gradient(0deg,transparent 49%,rgba(201,149,45,.1) 50%,transparent 51%),
    #fbf2df;
  background-size:42px 72px,42px 72px,42px 72px,auto;
}
#contact > *{
  position:relative;
  z-index:1;
}
.sectionTop{display:flex;justify-content:space-between;align-items:end;gap:24px;margin-bottom:24px}
h2{font-size:clamp(30px,4vw,48px);line-height:1;margin:0;letter-spacing:0}
.titleAccent{
  position:relative;
  display:inline-block;
}
.titleAccent:after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:-15px;
  height:12px;
  border-bottom:4px solid var(--gold);
  border-radius:0 0 50% 50%;
}
.sub{color:var(--muted);max-width:670px;margin:10px 0 0}
#showreel.wrap{
  width:100%;
  max-width:none;
  padding-left:0;
  padding-right:0;
}
.projectNavigator{
  min-height:auto;
  overflow:visible;
  background:#fbf2df;
  box-shadow:0 0 0 100vmax #fbf2df;
}
.showreelSticky{
  position:relative;
  top:auto;
  width:100%;
  margin:0 auto;
}
.showreelCarousel{
  position:relative;
  min-height:760px;
  display:grid;
  place-items:center;
  overflow:visible;
}
.showreelPanel{
  position:relative;
  z-index:2;
  width:min(560px,72vw);
  aspect-ratio:1;
  border:1px solid rgba(201,149,45,.42);
  border-radius:50%;
  background:rgba(255,250,240,.66);
  box-shadow:0 34px 90px rgba(32,38,48,.16),0 0 0 26px rgba(201,149,45,.08);
}
.projectCircleDemo{
  position:absolute;
  inset:0;
  border-radius:50%;
}
.reelStage{
  position:absolute;
  inset:0;
  overflow:hidden;
  border:10px solid #fffaf0;
  border-radius:50%;
  background:#111;
  box-shadow:0 22px 70px rgba(0,0,0,.28);
}
.reelStage video,.reelStage img{width:100%;height:100%;object-fit:cover;background:#111}
.projectInfoCircle{
  position:absolute;
  left:50%;
  bottom:-20px;
  z-index:5;
  width:min(300px,58%);
  aspect-ratio:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  border:1px solid rgba(201,149,45,.5);
  border-radius:50%;
  padding:34px;
  color:#171109;
  background:#f4e3c7;
  box-shadow:0 24px 64px rgba(32,38,48,.2);
  opacity:0;
  pointer-events:none;
  transform:translate(-50%,52%) rotate(-90deg) scale(.72);
  transform-origin:50% -72%;
  transition:opacity .28s ease,transform .48s cubic-bezier(.2,.85,.2,1);
}
.projectCircleDemo:hover .projectInfoCircle,
.projectCircleDemo:focus-within .projectInfoCircle{
  opacity:1;
  transform:translate(34%,-24%) rotate(0) scale(1);
}
.projectInfoCircle h3{
  display:-webkit-box;
  max-height:76px;
  margin:0 0 8px;
  overflow:hidden;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  font-size:clamp(18px,2vw,24px);
  line-height:1.05;
}
.projectInfoCircle .category{
  display:-webkit-box;
  max-height:36px;
  margin-bottom:8px;
  overflow:hidden;
  color:#846019;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  font-size:11px;
}
.projectInfoCircle .desc{
  display:-webkit-box;
  max-height:92px;
  margin:0;
  overflow:hidden;
  color:rgba(23,17,9,.72);
  -webkit-line-clamp:5;
  -webkit-box-orient:vertical;
  font-size:12px;
  line-height:1.35;
}
.projectOrbitCircle{
  --orbit-radius:min(490px,43vw);
  position:absolute;
  left:50%;
  top:50%;
  z-index:1;
  width:min(980px,86vw);
  aspect-ratio:1;
  border:1px solid rgba(201,149,45,.32);
  border-radius:50%;
  transform:translate(-50%,-50%);
}
.projectOrbitCircle:before,
.projectOrbitCircle:after{
  content:"";
  position:absolute;
  inset:9%;
  border:1px dashed rgba(20,24,32,.14);
  border-radius:50%;
}
.projectOrbitCircle:after{
  inset:22%;
  border-style:solid;
  opacity:.45;
}
.projectDot{
  --dot-angle:0deg;
  position:absolute;
  left:50%;
  top:50%;
  width:18px;
  height:18px;
  border:2px solid #fffaf0;
  border-radius:50%;
  padding:0;
  background:rgba(20,24,32,.45);
  box-shadow:0 8px 18px rgba(32,38,48,.16);
  transform:rotate(var(--dot-angle)) translate(var(--orbit-radius)) rotate(calc(var(--dot-angle) * -1));
  transform-origin:center;
  transition:background .2s ease,transform .2s ease,box-shadow .2s ease;
}
.projectDot:hover,
.projectDot.active{
  background:var(--gold);
  box-shadow:0 10px 24px rgba(201,149,45,.36);
}
.projectDot.active{
  width:24px;
  height:24px;
}
.projectDotLabel{
  position:absolute;
  left:50%;
  top:calc(100% + 10px);
  width:max-content;
  max-width:170px;
  border:1px solid rgba(20,24,32,.12);
  border-radius:999px;
  padding:6px 9px;
  color:#171109;
  background:#fffaf0;
  box-shadow:0 12px 26px rgba(32,38,48,.12);
  font-size:11px;
  font-weight:850;
  opacity:0;
  pointer-events:none;
  transform:translate(-50%,-4px);
  transition:opacity .18s ease,transform .18s ease;
}
.projectDot:hover .projectDotLabel,
.projectDot.active .projectDotLabel{
  opacity:1;
  transform:translate(-50%,0);
}
.projectHint{
  position:absolute;
  right:10%;
  bottom:10%;
  z-index:6;
  display:flex;
  align-items:center;
  gap:6px;
  border:1px solid rgba(20,24,32,.1);
  border-radius:999px;
  padding:6px 10px 6px 6px;
  color:rgba(255,255,255,.9);
  background:rgba(8,9,13,.46);
  opacity:.78;
  transform:none;
  backdrop-filter:blur(12px);
  box-shadow:0 18px 40px rgba(0,0,0,.22);
  transition:opacity .2s ease,transform .2s ease,background .2s ease;
}
.projectHint:hover{opacity:1;transform:translateY(-2px);background:rgba(8,9,13,.68)}
.projectHintArrow{
  flex:0 0 auto;
  width:24px;
  height:24px;
  display:grid;
  place-items:center;
  border-radius:50%;
  color:#171109;
  background:var(--gold);
  font-size:16px;
  line-height:1;
}
.projectHintText{
  color:#fff;
  font-size:10px;
  font-weight:850;
  text-transform:uppercase;
  letter-spacing:.06em;
}
.mediaPlay{
  position:absolute;
  left:50%;
  top:50%;
  z-index:3;
  width:58px;
  height:58px;
  display:grid;
  place-items:center;
  border:0;
  border-radius:50%;
  color:#171109;
  background:var(--gold);
  box-shadow:0 18px 42px rgba(0,0,0,.28),0 0 0 8px rgba(201,149,45,.18);
  transform:translate(-50%,-50%);
  transition:transform .18s ease,box-shadow .18s ease;
}
.mediaPlay:hover{
  transform:translate(-50%,-50%) scale(1.06);
  box-shadow:0 20px 46px rgba(0,0,0,.32),0 0 0 10px rgba(201,149,45,.2);
}
.mediaPlayIcon{
  width:0;
  height:0;
  margin-left:4px;
  border-top:11px solid transparent;
  border-bottom:11px solid transparent;
  border-left:17px solid currentColor;
}
.mediaControls{
  position:absolute;
  left:50%;
  bottom:18px;
  z-index:5;
  display:flex;
  gap:8px;
  transform:translateX(-50%);
}
.mediaControl{
  min-width:42px;
  height:38px;
  display:inline-grid;
  place-items:center;
  border:1px solid rgba(255,255,255,.3);
  border-radius:999px;
  padding:0 10px;
  color:#fff;
  background:rgba(8,9,13,.62);
  backdrop-filter:blur(10px);
  box-shadow:0 12px 28px rgba(0,0,0,.24);
  font-size:12px;
  font-weight:850;
}
.mediaControl svg{
  width:18px;
  height:18px;
  display:block;
  stroke:currentColor;
}
.mediaControl:hover{
  color:#171109;
  background:var(--gold);
}
.mediaZoom{
  width:100%;
  height:100%;
  border:0;
  padding:0;
  background:#111;
}
.mediaZoom img{width:100%;height:100%;object-fit:contain}
.projectCircleDemo .mediaZoom img{object-fit:cover}
.projectTree{
  position:relative;
  display:grid;
  gap:140px;
  padding:48px 0 80px;
  overflow:visible;
}
.projectTree:before{
  display:none;
}
.projectSegmentSvg{
  position:absolute;
  left:0;
  top:50%;
  z-index:0;
  width:100%;
  height:calc(100% + 140px);
  overflow:visible;
  pointer-events:none;
}
.projectConnectionShadow,
.projectConnectionLine{
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
  vector-effect:non-scaling-stroke;
}
.projectConnectionShadow{
  stroke:rgba(20,24,32,.12);
  stroke-width:16;
}
.projectConnectionLine{
  stroke:rgba(201,149,45,.72);
  stroke-width:5;
}
.projectBranch{
  --branch-side:1;
  --branch-lift:-18px;
  --branch-joint:22%;
  position:relative;
  z-index:1;
  min-height:620px;
  display:grid;
  align-items:center;
  grid-template-columns:minmax(380px,.5fr) minmax(0,1.5fr);
  column-gap:32px;
  padding-inline:clamp(24px,4vw,72px);
}
.projectBranch:nth-child(even){
  --branch-side:-1;
  --branch-lift:18px;
  --branch-joint:78%;
}
.projectBranch:before{
  display:none;
}
.projectBranch:nth-child(even):before{
  display:none;
}
.projectBranch:after{
  display:none;
}
.projectSystem{
  position:relative;
  width:min(860px,60vw);
  aspect-ratio:1;
  grid-column:2;
  justify-self:end;
  margin-left:0;
  margin-right:0;
}
.projectBranch:nth-child(even) .projectSystem{
  grid-column:1;
  grid-row:1;
  justify-self:start;
  margin-left:0;
  margin-right:0;
}
.projectBranch:nth-child(even){
  grid-template-columns:minmax(0,1.5fr) minmax(380px,.5fr);
}
.projectSystemOrbit{
  position:absolute;
  inset:4%;
  border:1px solid rgba(201,149,45,.34);
  border-radius:50%;
}
.projectSystemOrbit:before,
.projectSystemOrbit:after{
  content:"";
  position:absolute;
  inset:13%;
  border:1px dashed rgba(20,24,32,.13);
  border-radius:50%;
}
.projectSystemOrbit:after{
  inset:27%;
  border-style:solid;
  opacity:.45;
}
.projectPlanet{
  position:absolute;
  left:50%;
  top:50%;
  z-index:2;
  width:72%;
  aspect-ratio:1;
  border:9px solid #fffaf0;
  border-radius:50%;
  overflow:hidden;
  background:#111;
  box-shadow:0 28px 76px rgba(32,38,48,.24),0 0 0 18px rgba(201,149,45,.08);
  transform:translate(-50%,-50%);
}
.projectPlanet video,
.projectPlanet img{
  width:100%;
  height:100%;
  object-fit:cover;
  background:#111;
}
.projectPlanet .mediaZoom{
  width:100%;
  height:100%;
}
.projectResource{
  --resource-angle:0deg;
  --resource-radius:min(376px,26vw);
  position:absolute;
  left:50%;
  top:50%;
  z-index:3;
  width:58px;
  aspect-ratio:1;
  border:4px solid #fffaf0;
  border-radius:50%;
  padding:0;
  overflow:hidden;
  background:#111;
  box-shadow:0 14px 34px rgba(32,38,48,.18);
  transform:rotate(var(--resource-angle)) translate(var(--resource-radius)) rotate(calc(var(--resource-angle) * -1));
  transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease;
}
.projectResource:hover,
.projectResource.active{
  border-color:var(--gold);
  box-shadow:0 16px 40px rgba(201,149,45,.32);
}
.projectResource img,
.projectResource video{
  width:100%;
  height:100%;
  object-fit:cover;
}
.projectResourceType{
  position:absolute;
  left:50%;
  bottom:-1px;
  width:100%;
  padding:2px 0;
  color:#fff;
  background:rgba(8,9,13,.68);
  font-size:8px;
  font-weight:850;
  text-transform:uppercase;
  transform:translateX(-50%);
}
.projectBranchLabel{
  position:relative;
  z-index:3;
  grid-column:1;
  justify-self:end;
  width:min(560px,100%);
  margin-right:0;
  overflow:hidden;
  border:1px solid rgba(201,149,45,.38);
  border-radius:24px;
  padding:34px 34px 28px;
  color:rgba(23,17,9,.76);
  background:
    linear-gradient(135deg,rgba(255,250,240,.94),rgba(244,227,199,.9)),
    #fffaf0;
  box-shadow:0 24px 70px rgba(32,38,48,.14),inset 0 1px 0 rgba(255,255,255,.72);
  transition:transform .22s ease,border-color .22s ease,box-shadow .22s ease;
}
.projectBranchLabel:before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:7px;
  background:linear-gradient(180deg,var(--gold),rgba(201,149,45,.28));
}
.projectBranchLabel:after{
  content:"";
  position:absolute;
  right:-70px;
  top:-80px;
  width:180px;
  height:180px;
  border:1px solid rgba(201,149,45,.22);
  border-radius:50%;
  background:radial-gradient(circle,rgba(201,149,45,.16),transparent 64%);
  pointer-events:none;
}
.projectBranchLabel:hover{
  transform:translateY(-4px);
  border-color:rgba(201,149,45,.58);
  box-shadow:0 30px 82px rgba(32,38,48,.18),inset 0 1px 0 rgba(255,255,255,.8);
}
.projectBranch:nth-child(even) .projectBranchLabel{
  grid-column:2;
  justify-self:start;
  margin-right:0;
  margin-left:0;
  text-align:left;
}
.projectBranchLabel strong{
  position:relative;
  z-index:1;
  display:block;
  color:#171109;
  font-size:clamp(24px,2.6vw,38px);
  line-height:1.05;
}
.projectBranchLabel span{
  position:relative;
  z-index:1;
  display:inline-flex;
  align-items:center;
  width:fit-content;
  max-width:100%;
  margin:0 0 14px;
  border:1px solid rgba(201,149,45,.36);
  border-radius:999px;
  padding:7px 10px;
  color:#6f5012;
  background:rgba(255,255,255,.56);
  font-size:13px;
  font-weight:850;
  line-height:1.2;
}
.projectBranchLabel p{
  position:relative;
  z-index:1;
  display:block;
  max-height:none;
  margin:18px 0 0;
  overflow:visible;
  color:rgba(23,17,9,.72);
  font-size:16px;
  line-height:1.55;
}
.lightbox{
  position:fixed;
  inset:0;
  z-index:80;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:rgba(8,9,13,.88);
}
.lightboxFrame{
  position:relative;
  max-width:92vw;
  max-height:86vh;
  display:grid;
  place-items:center;
}
.lightbox img{
  max-width:100%;
  max-height:86vh;
  object-fit:contain;
  border-radius:14px;
  box-shadow:0 24px 80px rgba(0,0,0,.44);
}
.lightboxNav{
  position:fixed;
  top:50%;
  width:44px;
  height:44px;
  display:grid;
  place-items:center;
  border:1px solid rgba(255,255,255,.28);
  border-radius:50%;
  color:#171109;
  background:var(--gold);
  box-shadow:0 16px 40px rgba(0,0,0,.28);
  transform:translateY(-50%);
}
.lightboxPrev{left:24px}
.lightboxNext{right:24px}
.lightboxClose{
  position:fixed;
  top:18px;
  right:18px;
  z-index:2;
  min-width:88px;
  height:38px;
  border:1px solid rgba(255,255,255,.32);
  border-radius:999px;
  color:#fff;
  background:rgba(8,9,13,.62);
  backdrop-filter:blur(10px);
  font-size:12px;
  font-weight:850;
  text-transform:uppercase;
  letter-spacing:.08em;
}
.lightboxCount{
  position:absolute;
  left:50%;
  bottom:18px;
  border:1px solid rgba(255,255,255,.22);
  border-radius:999px;
  padding:7px 12px;
  color:#fff;
  background:rgba(8,9,13,.62);
  font-size:12px;
  font-weight:800;
  transform:translateX(-50%);
}
.assetCount{
  position:absolute;
  left:14px;
  top:14px;
  z-index:2;
  border:1px solid rgba(255,255,255,.28);
  border-radius:999px;
  padding:7px 10px;
  color:#fff;
  background:rgba(8,9,13,.62);
  backdrop-filter:blur(10px);
  font-size:12px;
  font-weight:800;
}
.carouselControls{
  position:absolute;
  left:14px;
  right:14px;
  bottom:14px;
  z-index:2;
  display:flex;
  justify-content:space-between;
  pointer-events:none;
}
.carouselControls button{
  pointer-events:auto;
  width:42px;
  height:42px;
  border:1px solid rgba(255,255,255,.32);
  border-radius:50%;
  color:#fff;
  background:rgba(8,9,13,.58);
  backdrop-filter:blur(10px);
}
.reelCopy{
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
  min-height:0;
  padding:30px;
  background:#f4e3c7;
}
.reelCopy h3,.projectInfo h3,.service h3{margin:0 0 10px}
.reelCopy h3{
  display:-webkit-box;
  max-height:68px;
  overflow:hidden;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}
.reelCopy .category{
  display:-webkit-box;
  max-height:40px;
  overflow:hidden;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}
.reelCopy .desc{
  display:-webkit-box;
  max-height:96px;
  overflow:hidden;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
}
.projectRail{
  position:absolute;
  top:0;
  bottom:0;
  left:-190px;
  width:174px;
  z-index:4;
  pointer-events:none;
  overflow:visible;
}
.projectRail:before{
  content:"";
  position:absolute;
  top:12%;
  bottom:12%;
  left:18px;
  width:1px;
  background:linear-gradient(180deg,transparent,rgba(20,24,32,.24),transparent);
}
.railItem{
  --rail-offset:0;
  --rail-depth:0px;
  --rail-scale:.5;
  --rail-opacity:.32;
  position:absolute;
  top:50%;
  left:0;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:0;
  padding:0;
  color:var(--muted);
  background:transparent;
  opacity:var(--rail-opacity);
  transform:translate(var(--rail-depth),calc(-50% + (var(--rail-offset) * 38px))) scale(var(--rail-scale));
  transform-origin:center;
  pointer-events:auto;
  transition:opacity .2s ease,transform .2s ease,color .2s ease,z-index .2s ease;
}
.railItem:hover{opacity:.86;color:var(--text)}
.railLabel{
  position:relative;
  z-index:1;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  max-width:178px;
  border:1px solid rgba(20,24,32,.14);
  border-radius:999px;
  padding:10px 16px;
  background:#fff8ed;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-size:14px;
  font-weight:850;
  text-align:left;
  box-shadow:0 10px 22px rgba(32,38,48,.06);
  transition:background .2s ease,border-color .2s ease,color .2s ease,box-shadow .2s ease;
}
.railLabel:before{
  content:"";
  position:absolute;
  inset:-3px;
  z-index:-1;
  border-radius:999px;
  background:#fff8ed;
}
.railItem.active .railLabel:before{background:var(--gold)}
.railItem:after{
  content:attr(data-full-label);
  position:absolute;
  left:100%;
  top:50%;
  width:max-content;
  max-width:280px;
  margin-left:12px;
  border:1px solid rgba(20,24,32,.14);
  border-radius:10px;
  padding:8px 10px;
  color:var(--text);
  background:#fffaf0;
  box-shadow:0 14px 32px rgba(32,38,48,.16);
  font-size:12px;
  font-weight:800;
  line-height:1.25;
  text-align:left;
  white-space:normal;
  opacity:0;
  pointer-events:none;
  transform:translate(6px,-50%);
  transition:opacity .18s ease,transform .18s ease;
}
.railItem:hover:after,
.railItem:focus-visible:after{
  opacity:1;
  transform:translate(0,-50%);
}
.railItem.near{color:rgba(20,24,32,.78)}
.railItem.mid{color:rgba(20,24,32,.56)}
.railItem.far{color:rgba(20,24,32,.42)}
.railItem.active{
  color:#171109;
  opacity:1;
  --rail-depth:0px;
  --rail-scale:1.12;
  --rail-opacity:1;
  z-index:3;
}
.railItem.active .railLabel{
  min-height:46px;
  max-width:196px;
  border-color:var(--gold);
  background:var(--gold);
  box-shadow:0 12px 24px rgba(201,149,45,.28);
  font-size:15px;
}
.assetStrip{
  flex:0 0 auto;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  max-height:124px;
  margin:16px 0 18px;
  overflow:hidden;
  padding-bottom:4px;
}
.assetThumb{
  flex:0 0 54px;
  width:54px;
  aspect-ratio:1;
  border:2px solid transparent;
  border-radius:10px;
  padding:0;
  overflow:hidden;
  background:#111;
}
.assetThumb.active{border-color:var(--gold)}
.assetThumb img,.assetThumb video{width:100%;height:100%;object-fit:cover}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.filter{
  border:1px solid var(--line);
  color:var(--muted);
  background:rgba(255,255,255,.62);
  border-radius:999px;
  padding:10px 14px;
}
.filter.active{color:#fff;background:var(--text);border-color:var(--text);font-weight:800}
.workLayout{display:block}
.eyebrow{color:var(--gold);font-size:12px;text-transform:uppercase;letter-spacing:.14em;font-weight:850}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-auto-rows:1fr;gap:16px}
.card{
  height:520px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:18px;
  background:rgba(255,255,255,.78);
  transition:transform .22s ease,border-color .22s ease,background .22s ease;
}
.card:hover{transform:translateY(-4px);border-color:rgba(201,149,45,.42);background:#fff}
.thumb{position:relative;aspect-ratio:16/10;background:#111;overflow:hidden;border:0;padding:0;width:100%;color:inherit;text-align:left;flex:0 0 auto}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover;background:#111;transition:transform .32s ease}
.card:hover .thumb img,.card:hover .thumb video{transform:scale(1.035)}
.tag{
  position:absolute;
  left:12px;
  top:12px;
  border:1px solid rgba(255,255,255,.32);
  border-radius:999px;
  padding:7px 10px;
  background:rgba(8,9,13,.68);
  backdrop-filter:blur(8px);
  font-size:12px;
}
.projectInfo{padding:18px;display:flex;flex:1;flex-direction:column}
.category{color:var(--cyan);font-size:13px;font-weight:800;margin-bottom:9px}
.desc{color:var(--muted);margin:0 0 16px}
.card .category{
  display:-webkit-box;
  min-height:38px;
  max-height:38px;
  overflow:hidden;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}
.card h3{
  display:-webkit-box;
  min-height:58px;
  max-height:58px;
  overflow:hidden;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}
.card .desc{
  display:-webkit-box;
  min-height:96px;
  max-height:96px;
  overflow:hidden;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
}
.card .btn{margin-top:auto;align-self:flex-start}
.metaLine{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.pill{border:1px solid var(--line);border-radius:999px;padding:6px 9px;color:var(--muted);font-size:12px;background:rgba(255,255,255,.035)}
.services{
  display:grid;
  gap:18px;
}
.serviceRow{
  display:flex;
}
.serviceRow:nth-child(even){
  justify-content:flex-end;
}
.service{
  width:min(560px,78%);
  border:1px solid rgba(201,149,45,.58);
  border-radius:18px;
  padding:22px;
  color:#171109;
  background:linear-gradient(180deg,#fff4dc,#efd29a);
  box-shadow:0 18px 44px rgba(0,0,0,.34),0 0 0 1px rgba(255,250,240,.18),0 0 34px rgba(201,149,45,.18);
  transform-origin:center;
  animation:serviceFloat 5.8s ease-in-out infinite;
  transition:transform .24s ease,box-shadow .24s ease,border-color .24s ease;
}
.serviceRow:nth-child(even) .service{
  text-align:right;
  animation-delay:-2.4s;
}
.serviceRow:nth-child(3n) .service{
  animation-delay:-1.2s;
}
.service:hover{
  transform:translateY(-8px) scale(1.025);
  border-color:rgba(255,248,234,.82);
  box-shadow:0 26px 62px rgba(0,0,0,.42),0 0 0 1px rgba(255,250,240,.32),0 0 48px rgba(201,149,45,.28);
}
.service p{margin:0;color:rgba(23,17,9,.72)}
@keyframes serviceFloat{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-10px) scale(1.015)}
}
@media (prefers-reduced-motion:reduce){
  .service{animation:none}
}
#about{
  background:#fbf2df;
  box-shadow:0 0 0 100vmax #fbf2df;
  padding-bottom:92px;
}
#about:after{
  content:"";
  position:absolute;
  left:4%;
  right:4%;
  bottom:18px;
  height:34px;
  border-bottom:4px solid var(--gold);
  border-radius:0 0 50% 50%;
}
.about{
  display:grid;
  grid-template-columns:.72fr 1.28fr;
  gap:22px;
  align-items:stretch;
  min-width:0;
}
.aboutPortrait{
  position:relative;
  min-height:360px;
  border:1px solid rgba(201,149,45,.28);
  border-radius:24px;
  overflow:hidden;
  background:#111;
  box-shadow:0 24px 70px rgba(32,38,48,.14);
}
.aboutPortrait img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.aboutPortrait:after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,transparent 46%,rgba(8,9,13,.58));
}
.aboutLinks{
  position:absolute;
  inset:0;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:22px;
  background:rgba(8,9,13,.72);
  opacity:0;
  transform:scale(1.02);
  transition:opacity .24s ease,transform .24s ease;
}
.aboutPortrait:hover .aboutLinks,
.aboutPortrait:focus-within .aboutLinks{
  opacity:1;
  transform:scale(1);
}
.aboutLinks a{
  width:min(220px,100%);
  border:1px solid rgba(201,149,45,.5);
  border-radius:999px;
  padding:9px 13px;
  color:#fffaf0;
  background:rgba(201,149,45,.18);
  text-align:center;
  font-size:13px;
  font-weight:850;
  backdrop-filter:blur(10px);
  transition:background .18s ease,transform .18s ease;
}
.aboutLinks a:hover{
  background:var(--gold);
  color:#171109;
  transform:translateY(-2px);
}
.aboutBadge{
  position:absolute;
  left:18px;
  bottom:18px;
  z-index:1;
  display:inline-flex;
  align-items:center;
  gap:8px;
  border:1px solid rgba(255,255,255,.24);
  border-radius:999px;
  padding:9px 13px;
  color:#fffaf0;
  background:rgba(8,9,13,.54);
  backdrop-filter:blur(10px);
  font-size:12px;
  font-weight:850;
}
.moroccoStar{
  width:16px;
  height:16px;
  display:block;
}
.aboutPanel{
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
  border:1px solid rgba(201,149,45,.24);
  border-radius:24px;
  padding:34px;
  background:rgba(255,250,240,.72);
  box-shadow:0 18px 54px rgba(32,38,48,.1);
}
.aboutRemote{
  display:inline-block;
  position:relative;
  width:max-content;
  margin:0 0 20px;
  color:var(--text);
  font-size:14px;
  font-weight:850;
  text-transform:uppercase;
  letter-spacing:.08em;
  border-bottom:0;
}
.aboutRemote:after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:-9px;
  height:12px;
  border-bottom:3px solid var(--gold);
  border-radius:0 0 50% 50%;
}
.aboutPanel p{

function Hero(){
  const [scrollProgress,setScrollProgress]=React.useState(0);
  const [hasScrolled,setHasScrolled]=React.useState(false);
  const [heroDormant,setHeroDormant]=React.useState(false);
  const [frameRatio,setFrameRatio]=React.useState('16 / 9');
  const heroRef=React.useRef(null);
  const bgVideoRef=React.useRef(null);
  const frameVideoRef=React.useRef(null);
  const active=heroReel[0];
  const syncHeroVideos=React.useCallback((force=false)=>{
    const bgVideo=bgVideoRef.current;
    const frameVideo=frameVideoRef.current;
    if(!bgVideo || !frameVideo || !Number.isFinite(bgVideo.duration)) return;
    if(bgVideo.readyState<2 || frameVideo.readyState<1) return;
    const drift=Math.abs(frameVideo.currentTime-bgVideo.currentTime);
    if(force || drift>.045) frameVideo.currentTime=bgVideo.currentTime;
    if(!bgVideo.paused && frameVideo.paused){
      frameVideo.play().catch(()=>{});
    }
  },[]);
  React.useEffect(()=>{
    let frame=0;
    const update=()=>{
      frame=0;
      const node=heroRef.current;
      if(!node) return;
      setHasScrolled(window.scrollY>12);
      const rect=node.getBoundingClientRect();
      const distance=Math.min(Math.max(-rect.top,0),window.innerHeight*.72);
      setScrollProgress(distance/(window.innerHeight*.72));
      setHeroDormant(rect.bottom<80);
    };
    const onScroll=()=>{
      if(frame) return;
      frame=window.requestAnimationFrame(update);
    };
    update();
    window.addEventListener('scroll',onScroll,{passive:true});
    window.addEventListener('resize',onScroll);
    return ()=>{
      if(frame) window.cancelAnimationFrame(frame);
      window.removeEventListener('scroll',onScroll);
      window.removeEventListener('resize',onScroll);
    };
  },[]);
  React.useEffect(()=>{
    let syncFrame=0;
    const tick=()=>{
      syncHeroVideos();
      syncFrame=window.requestAnimationFrame(tick);
    };
    syncHeroVideos(true);
    syncFrame=window.requestAnimationFrame(tick);
    return ()=>window.cancelAnimationFrame(syncFrame);
  },[syncHeroVideos]);
  React.useEffect(()=>{
    const bgVideo=bgVideoRef.current;
    const frameVideo=frameVideoRef.current;
    if(!bgVideo) return;
    if(heroDormant){
      bgVideo.pause();
      if(frameVideo) frameVideo.pause();
    }else{
      bgVideo.play().catch(()=>{});
      if(frameVideo && hasScrolled) frameVideo.play().catch(()=>{});
    }
  },[heroDormant,hasScrolled]);
  const heroStyle={
    '--hero-progress':scrollProgress,
    '--hero-overlay':hasScrolled ? .34 : 0,
    '--hero-video-opacity':hasScrolled ? Math.max(.28,1 - (1.02 * scrollProgress)) : 1,
    '--copy-opacity':hasScrolled ? 1 : 0,
    '--copy-y':hasScrolled ? '0px' : '54px',
    '--frame-ratio':frameRatio
  };
  return <header id="top" ref={heroRef} className={`hero ${hasScrolled?'hasScrolled':''}`} style={heroStyle}>
    <div className={`heroBg ${heroDormant?'isDormant':''}`} aria-hidden="true">
      <video ref={bgVideoRef} key={active.src} autoPlay muted loop playsInline preload="auto" onLoadedData={()=>syncHeroVideos(true)} onPlay={()=>syncHeroVideos(true)}>
        <source src={active.src} type="video/mp4" />
      </video>
    </div>
    <div className="wrap heroLayout">
      <div className={`heroGlass ${hasScrolled?'isVisible':''}`}>
        <p className="roleLine">3D Artist / AI Video Creator / Motion Designer</p>
        <h1><span className="highlight">Cinematic</span> <span className="highlight">3D</span> & <span className="highlight">AI visuals</span> for <span className="highlight">brands</span> that need to stand out.</h1>
        <p className="lead">I create product films, virtual influencer content, CGI scenes, AI ads, and motion design built for campaigns, launches, and social media.</p>
      </div>
      <div className={`heroFrame ${hasScrolled?'isVisible':''}`} aria-hidden="true">
        <video ref={frameVideoRef} key={`${active.src}-frame`} autoPlay muted loop playsInline preload="auto" onLoadedMetadata={e=>{
          const video=e.currentTarget;
          if(video.videoWidth && video.videoHeight) setFrameRatio(`${video.videoWidth} / ${video.videoHeight}`);
          syncHeroVideos(true);
        }} onLoadedData={()=>syncHeroVideos(true)} onPlay={()=>syncHeroVideos(true)} onSeeked={()=>syncHeroVideos()}>
          <source src={active.src} type="video/mp4" />
        </video>
      </div>
    </div>
  </header>;
}

function ProjectSystem({item,index,isLast,onOpenLightbox}){
  const [mediaIndex,setMediaIndex]=React.useState(0);
  const [videoPlaying,setVideoPlaying]=React.useState(false);
  const [muted,setMuted]=React.useState(true);

  const label=item.title.split(' - ')[0];
  React.useEffect(()=>setVideoPlaying(false),[activeMedia?.src]);
  React.useEffect(()=>{
    const video=activeVideoRef.current;
    if(video) video.muted=muted;
  },[muted,activeMedia?.src]);
  React.useEffect(()=>{
    const onFullscreenChange=()=>{
      const video=activeVideoRef.current;
      if(video && !document.fullscreenElement && !document.webkitFullscreenElement){
        video.controls=false;
      }
    };
    document.addEventListener('fullscreenchange',onFullscreenChange);
    document.addEventListener('webkitfullscreenchange',onFullscreenChange);
    return ()=>{
      document.removeEventListener('fullscreenchange',onFullscreenChange);
      document.removeEventListener('webkitfullscreenchange',onFullscreenChange);
    };
  },[]);
  React.useEffect(()=>{
    const node=systemRef.current;
    if(!node) return;
    const observer=new IntersectionObserver(entries=>{
      setIsVisible(entries[0].isIntersecting);
    },{threshold:.38,rootMargin:'120px 0px'});
    observer.observe(node);
    return ()=>observer.disconnect();
  },[]);
  React.useEffect(()=>{
    const video=activeVideoRef.current;
    if(!video || activeMedia.type!=='video') return;
    if(isVisible){
      video.play().catch(()=>{});
    }else{
      video.pause();
    }
  },[isVisible,activeMedia?.src,activeMedia?.type]);
  const playActiveVideo=()=>{
    const video=activeVideoRef.current;
    if(video) video.play();
  };
  const toggleSound=()=>{
    const video=activeVideoRef.current;
    if(!video) return;
    const nextMuted=!muted;
    video.muted=nextMuted;
    setMuted(nextMuted);
    if(!nextMuted) video.play().catch(()=>{});
  };
  const openVideoFullscreen=()=>{
    const video=activeVideoRef.current;
    if(!video) return;
    video.controls=true;
    video.muted=muted;
    video.play().catch(()=>{});
    if(video.requestFullscreen){
      video.requestFullscreen();
    }else if(video.webkitEnterFullscreen){
      video.webkitEnterFullscreen();
    }else if(video.webkitRequestFullscreen){
      video.webkitRequestFullscreen();
    }

      return;
    }
    openImageFrame(activeMedia.src);
  };
  const openImageFrame=src=>{
    const imageIndex=imageItems.findIndex(media=>media.src===src);
    if(imageIndex>=0) onOpenLightbox({title:item.title,images:imageItems,index:imageIndex});
  };
  return <article id={`project-${slugify(item.title)}`} className="projectBranch">
    {!isLast && <ProjectSegment index={index} />}
    <div className="projectBranchLabel">
      <span>{item.category}</span>

      <p>{item.desc}</p>

      <div className="projectSystemOrbit" aria-hidden="true"></div>
      <div className="projectPlanet">
        {activeMedia.type==='video'
          ? <React.Fragment>
              <video ref={activeVideoRef} key={activeMedia.src} muted={muted} loop playsInline preload="auto" poster={activeMedia.poster} onClick={openVideoFullscreen} onLoadedData={event=>{event.currentTarget.muted=muted;if(isVisible) event.currentTarget.play().catch(()=>{});}} onPlay={()=>setVideoPlaying(true)} onPause={()=>setVideoPlaying(false)}><source src={activeMedia.src} type="video/mp4" /></video>

              </div>

              <img key={activeMedia.src} src={activeMedia.src} alt={`${item.title} asset ${mediaIndex+1}`} loading="lazy" />

function Contact(){
  const [form,setForm]=React.useState({title:'',email:'',message:''});
  const [status,setStatus]=React.useState('');
  const [errors,setErrors]=React.useState({});
  const [submitting,setSubmitting]=React.useState(false);
  const validate=React.useCallback(()=>{
    const nextErrors={};
    const title=form.title.trim();
    const email=form.email.trim();
    const message=form.message.trim();
    if(!title) nextErrors.title='Project title is required.';
    if(!email){
      nextErrors.email='Email is required.';
    }else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
      nextErrors.email='Enter a valid email address.';
    }
    if(!message) nextErrors.message='Message is required.';
    return nextErrors;
  },[form]);
  const update=event=>{
    const {name,value}=event.target;
    setForm(current=>({...current,[name]:value}));
    setErrors(current=>{
      if(!current[name]) return current;
      const next={...current};
      delete next[name];
      return next;
    });
    setStatus('');
  };
  const submit=async event=>{
    event.preventDefault();
    const nextErrors=validate();
    setErrors(nextErrors);
    if(Object.keys(nextErrors).length){
      setStatus('Please fix the highlighted fields.');
      return;
    }
    setSubmitting(true);
    setStatus('Sending your message...');
    const payload=new URLSearchParams({
      'form-name':'contact',
      title:form.title.trim(),
      email:form.email.trim(),
      message:form.message.trim()
    });
    try{
      const response=await fetch('/',{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:payload.toString()
      });
      if(!response.ok) throw new Error('Form submission failed');
      setForm({title:'',email:'',message:''});
      setStatus('Message sent. Thank you.');
    }catch(error){
      setStatus('Message could not be sent. Please try again or email me directly.');
    }finally{
      setSubmitting(false);
    }
  };
  return <section id="contact" className="wrap">
    <div className="contact">
      <div className="contactInner">
        <div>
          <h2>Build a visual your brand can use.</h2>
          <p className="sub">For product ads, 3D visuals, AI content, virtual influencer work or social campaigns.</p>
          <a className="contactEmail" href={`mailto:${portfolioEmail}`}><FooterEmailIcon />{portfolioEmail}</a>
          <a className="contactPhone" href={portfolioPhoneHref}><PhoneIcon />{portfolioPhone}</a>
        </div>
        <form className="contactForm" name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" onSubmit={submit} noValidate>
          <input type="hidden" name="form-name" value="contact" />
          <p hidden><label>Do not fill this out: <input name="bot-field" /></label></p>
          <input className={errors.title?'isInvalid':''} name="title" value={form.title} onChange={update} placeholder="Project title" aria-label="Project title" aria-invalid={!!errors.title} aria-describedby={errors.title?'title-error':undefined} maxLength="120" required />
          {errors.title && <p className="fieldError" id="title-error">{errors.title}</p>}
          <input className={errors.email?'isInvalid':''} name="email" value={form.email} onChange={update} placeholder="Your email" type="email" aria-label="Your email" aria-invalid={!!errors.email} aria-describedby={errors.email?'email-error':undefined} maxLength="160" required />
          {errors.email && <p className="fieldError" id="email-error">{errors.email}</p>}
          <textarea className={errors.message?'isInvalid':''} name="message" value={form.message} onChange={update} placeholder="Tell me about your project" aria-label="Message" aria-invalid={!!errors.message} aria-describedby={errors.message?'message-error':undefined} maxLength="1200" required></textarea>
          {errors.message && <p className="fieldError" id="message-error">{errors.message}</p>}
          <button className="btn primary" type="submit" disabled={submitting}>{submitting?'Sending...':'Send'}</button>
          {status && <p className="formStatus">{status}</p>}
        </form>
      </div>
    </div>
  </section>;
}
function ChatWidget(){
  const [open,setOpen]=React.useState(false);
  const [form,setForm]=React.useState({name:'',email:'',message:''});
  const update=event=>setForm(current=>({...current,[event.target.name]:event.target.value}));

    event.preventDefault();

    const body=encodeURIComponent([

      `Email: ${form.email || '-'}`,
      '',
      form.message || '-'
    ].join('\n'));
    window.location.href=`mailto:${portfolioEmail}?subject=${subject}&body=${body}`;

  return <div className="chatWidget">
    {open && <div className="chatPanel" role="dialog" aria-label="Send Akram a message">

        <div><h3>Hi, send a message</h3><p>It will open your email app ready to send.</p></div>

        <textarea name="message" value={form.message} onChange={update} placeholder="Tell me about your project" required aria-label="Message"></textarea>
        <button className="btn primary" type="submit">Send Message</button>

    <button className="chatTrigger" onClick={()=>setOpen(current=>!current)} aria-expanded={open} aria-label="Open message form">Hi <span>{String.fromCodePoint(128075)}</span></button>
  </div>;
}

function App(){

      frame=0;
      const maxScroll=document.documentElement.scrollHeight-window.innerHeight;
      setScrollProgress(maxScroll>0 ? Math.min(Math.max(window.scrollY/maxScroll,0),1) : 0);
    };
    const onScroll=()=>{
      if(frame) return;
      frame=window.requestAnimationFrame(update);
    };
    update();
    window.addEventListener('scroll',onScroll,{passive:true});
    window.addEventListener('resize',onScroll);
    return ()=>{

      window.removeEventListener('scroll',onScroll);
      window.removeEventListener('resize',onScroll);
    };
